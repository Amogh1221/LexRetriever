name: Deploy to Hugging Face and Keep Alive

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 */8 * * *'  # Runs every 8 hours
  workflow_dispatch:      # Allows manual trigger

jobs:
  sync-to-hub:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
          lfs: true

      - name: Push to Hugging Face Space
        run: |
          git config --global user.email "bot@github.com"
          git config --global user.name "GitHub Action Bot"
          
          # Add the HF Space as a remote
          git remote add hf https://Amogh1221:${{ secrets.HF_TOKEN }}@huggingface.co/spaces/Amogh1221/lexretriver
          
          # Force push the contents of the 'backend' folder to the HF main branch
          git push hf `git subtree split --prefix backend main`:main --force

  ping-backend:
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Ping Backend
        run: |
          # Pings your health check endpoint
          curl -I https://amogh1221-lexretriver.hf.space/api/health
